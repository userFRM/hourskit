# Single source of truth for cargo-audit advisory exceptions.
# Keep aligned with deny.toml.
#
# `cargo audit` reads this when invoked from the project root.

[advisories]
ignore = [
    # `paste` (RUSTSEC-2024-0436) — archived/unmaintained, no CVE,
    # no runtime impact (proc-macro, compile-time only). Pulled in
    # transitively by `parquet 54.x`, which is itself gated behind
    # the default-on `parquet-loader` feature. Consumers that want
    # to drop the transitive `paste` can disable the feature; the
    # tradeoff is they must construct `SessionInfo` values from
    # explicit data instead of reading the bundled parquet.
    # Revisit when upstream `parquet` migrates to `pastey` or drops
    # the dependency entirely.
    "RUSTSEC-2024-0436",
]
