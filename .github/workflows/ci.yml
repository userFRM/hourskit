name: CI
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }
jobs:
  ci:
    uses: userFRM/kit-ci/.github/workflows/ci.yml@293185873c44fb33090f5e1257ab4e000fe71f92
    with:
      msrv: "1.86"
      manifest_check: |
        cargo run --example seed_data
        cp data/manifest.json /tmp/manifest.committed.json
        cargo run --bin hourskit-cli -- manifest
        if ! diff -u /tmp/manifest.committed.json data/manifest.json; then
          echo "::error::data/manifest.json drifted from the regenerated parquet."
          echo "Run 'cargo run --example seed_data && cargo run --bin hourskit-cli -- manifest' locally and commit both files."
          exit 1
        fi
