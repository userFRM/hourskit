name: security-nightly

# Daily security sweep — fresh advisory-db pull, audit + deny against
# the committed Cargo.lock. Catches new advisories filed against
# existing pinned versions without waiting for the next code push.

on:
  schedule:
    # 06:00 UTC daily (~02:00 ET, after RustSec daily refresh)
    - cron: '0 6 * * *'
  workflow_dispatch: {}

jobs:
  audit:
    name: cargo-audit (advisory sweep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run cargo audit
        run: cargo audit

  deny:
    name: cargo-deny (advisory + license sweep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  notify-on-failure:
    name: open-issue-on-finding
    needs: [audit, deny]
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4
      - name: Open issue on new advisory
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().slice(0, 10);
            const title = `security-nightly: advisory finding ${today}`;
            const body = [
              `Nightly security sweep failed on ${today}.`,
              ``,
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              ``,
              `Triage:`,
              `1. Identify the advisory(ies) flagged by cargo-audit / cargo-deny.`,
              `2. If a transitive dep needs upgrade — bump the lockfile.`,
              `3. If the advisory is benign / unfixable — add to audit.toml + deny.toml with rationale.`,
              `4. Re-run security-nightly via workflow_dispatch to confirm green.`,
            ].join('\n');
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'security',
            });
            const dup = existing.find(i => i.title === title);
            if (dup) {
              core.info(`Issue already exists: #${dup.number}`);
              return;
            }
            const { data } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['security'],
            });
            core.info(`Opened issue #${data.number}`);
